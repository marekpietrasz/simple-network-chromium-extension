<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="toolbar">
    <button id="clear" title="Clear captured calls">Clear</button>
    <label class="chk"><input type="checkbox" id="preserve" checked> Preserve log</label>
    <input type="search" id="filter" placeholder="Filter by URL / method / status">
    <span id="count" class="count">0 calls</span>
  </div>
  <div id="main">
    <div id="list" role="listbox" aria-label="Captured Fetch/XHR calls"></div>
    <div id="detail">
      <div class="empty">Select a call to see the details.<br>Fetch/XHR calls are captured live while this panel is open.</div>
    </div>
  </div>
  <script src="format.js"></script>
  <script src="panel.js"></script>
</body>
</html>
